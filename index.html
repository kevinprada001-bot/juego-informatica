<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién quiere ser experto en informática?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen" class="screen">
    <h1>🏆 ¿Quién quiere ser experto en informática?</h1>
    <p>Demuestra tus conocimientos sobre periféricos de entrada y salida.</p>
    <button id="start-btn">Comenzar</button>
</div>

<div id="quiz-screen" class="screen hidden">

    <div class="top-bar">
        <span id="question-counter"></span>
        <span id="score">Puntos: 0</span>
    </div>

    <div class="timer-container">
        <div id="timer-bar"></div>
    </div>

    <h2 id="question"></h2>

    <div id="answers" class="answers"></div>

</div>

<div id="result-screen" class="screen hidden">
    <h1>🎉 Juego Finalizado</h1>
    <h2 id="final-score"></h2>
    <button onclick="location.reload()">Jugar otra vez</button>
</div>

<script src="script.js"></script>

</body>
</html>
